 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vostok Station | Frost Gen v4.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        /* === UI/UX RESET & BASE === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* === CANVAS DE FONDO === */
        #fluidCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* === CAPA DE INTERFAZ === */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Deja pasar los clics al canvas si se requiere */
            display: flex;
            justify-content: space-between;
            padding: 2rem;
        }

        /* Permite interactuar solo con los paneles */
        .panel {
            pointer-events: auto; 
        }

        /* === WIDGET IZQUIERDO (ESTILO APP FITNESS) === */
        .left-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        .card {
            background: rgba(22, 22, 24, 0.85); /* Gris muy oscuro, casi negro */
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 1.5rem;
            width: 280px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        /* === CÍRCULO DE TEMPERATURA === */
        .circle-wrapper {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .progress-ring-container {
            position: relative;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            /* El fondo hace de pista oscura */
            background: #2a2a2c;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* El anillo que se llena con la temperatura */
        .progress-ring {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(#ffffff 0%, #ffffff var(--fill-pct, 50%), transparent var(--fill-pct, 50%), transparent 100%);
            mask: radial-gradient(transparent 58%, black 60%);
            -webkit-mask: radial-gradient(transparent 58%, black 60%);
        }

        .temp-display-circle {
            font-size: 1.2rem;
            font-weight: 600;
            z-index: 2;
        }

        .widget-labels {
            display: flex;
            flex-direction: column;
        }
        .widget-title { font-size: 0.95rem; font-weight: 600; }
        .widget-subtitle { font-size: 0.75rem; color: #8E8E93; margin-top: 2px;}

        /* === SLIDERS === */
        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #8E8E93;
            font-weight: 500;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #2a2a2c;
            border-radius: 3px;
            outline: none;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            border-radius: 50%;
            background: #FFFFFF;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.1s ease;
        }

        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0.5rem 0;
        }

        /* === BARRA VERTICAL DERECHA (TOOLINGS) === */
        .right-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        .toolbar {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background: rgba(22, 22, 24, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 0.8rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        button {
            background: #2a2a2c;
            color: #FFFFFF;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.65rem;
            font-weight: 500;
            gap: 4px;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #3a3a3c;
            transform: scale(1.05);
        }

        button.recording {
            background: #e74c3c;
            animation: pulse 1s infinite;
        }

        .icon { font-size: 1.1rem; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

    </style>
</head>
<body>

    <canvas id="fluidCanvas"></canvas>
    
    <div class="ui-layer">
        
        <div class="panel left-panel">
            <div class="card">
                <div class="header-title">Vostok</div>
                
                <div class="circle-wrapper">
                    <div class="progress-ring-container" id="ringContainer" style="--fill-pct: 50%;">
                        <div class="progress-ring"></div>
                        <div class="temp-display-circle" id="tempDisplay">-45°</div>
                    </div>
                    <div class="widget-labels">
                        <div class="widget-title">Core Temp</div>
                        <div class="widget-subtitle">Antarctica Station</div>
                    </div>
                </div>

                <div class="slider-container">
                    <div class="slider-header">
                        <span>-89°C</span>
                        <span>0°C</span>
                    </div>
                    <input type="range" id="tempSlider" min="-89" max="0" value="-45">
                </div>

                <div class="divider"></div>

                <div class="slider-container">
                    <div class="slider-header">
                        <span style="color: #FFFFFF; font-size: 0.85rem;">Halftone Density</span>
                        <span id="sizeValueDisplay">22px</span>
                    </div>
                    <input type="range" id="sizeSlider" min="10" max="40" value="22">
                </div>
            </div>
        </div>

        <div class="panel right-panel">
            <div class="toolbar">
                <button onclick="exportImage('16:9')">
                    <span class="icon">📸</span>
                    16:9
                </button>
                <button onclick="exportImage('3:4')">
                    <span class="icon">📱</span>
                    3:4
                </button>
                <div class="divider" style="margin: 0;"></div>
                <button onclick="exportGIF()" id="btnGif">
                    <span class="icon">🎞️</span>
                    GIF
                </button>
                <button onclick="exportVideo()" id="btnVideo">
                    <span class="icon">🎥</span>
                    REC
                </button>
            </div>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('fluidCanvas');
        const ctx = canvas.getContext('2d');
        const tempSlider = document.getElementById('tempSlider');
        const tempDisplay = document.getElementById('tempDisplay');
        const ringContainer = document.getElementById('ringContainer');
        const sizeSlider = document.getElementById('sizeSlider');
        const sizeValueDisplay = document.getElementById('sizeValueDisplay');
        
        let width, height;
        let time = 0;
        let gridSpacing = 22; 

        const palette = [
            '#010208', // Negro Abisal
            '#060C31', // Azul Muy Oscuro
            '#132378', // Royal Transición
            '#2244C4', // Azul Eléctrico
            '#BAD5EF', // Hielo Claro
            '#ffffff'  // Blanco Puro
        ];

        const glowThreshold = 3; 
        const glowColor = '#50e3c233'; 

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // Actualización de UI en vivo
        function updateUI() {
            let temp = parseInt(tempSlider.value);
            tempDisplay.textContent = `${temp}°`;
            
            // Calculamos porcentaje para rellenar el anillo (0 = 100%, -89 = 0%)
            let pct = ((temp + 89) / 89) * 100;
            ringContainer.style.setProperty('--fill-pct', `${pct}%`);
        }

        tempSlider.addEventListener('input', updateUI);
        
        sizeSlider.addEventListener('input', (e) => {
            gridSpacing = parseInt(e.target.value);
            sizeValueDisplay.textContent = `${gridSpacing}px`;
        });

        // Inicializar UI
        updateUI();

        // === MOTOR GENERATIVO CORREGIDO ===
        function draw() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);

            let tempValue = Math.abs(parseInt(tempSlider.value)); 
            let coldFactor = tempValue / 89; 

            for (let x = 0; x < width + gridSpacing; x += gridSpacing) {
                for (let y = 0; y < height + gridSpacing; y += gridSpacing) {
                    
                    let wave1 = Math.sin((x * 0.004) + time);
                    let wave2 = Math.cos((y * 0.005) - time);
                    let wave3 = Math.sin(((x + y) * 0.003) + time * 0.5);
                    
                    let rawIntensity = (wave1 + wave2 + wave3 + 3) / 6;
                    
                    let energyBias = 0.15 - (coldFactor * 0.5); 
                    let intensity = rawIntensity + energyBias;
                    
                    intensity = Math.max(0, Math.min(0.99, intensity));

                    let maxRadius = gridSpacing * 0.75; 
                    let radius = intensity * maxRadius;

                    let colorIndex = Math.floor(intensity * palette.length);
                    let c = palette[colorIndex];
                    
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    
                    if (colorIndex >= glowThreshold) {
                        ctx.shadowBlur = 18;
                        ctx.shadowColor = glowColor;
                    } else {
                        ctx.shadowBlur = 0;
                    }

                    ctx.fillStyle = c;
                    ctx.fill();
                }
            }

            time += 0.015 + (coldFactor * 0.01); 
            requestAnimationFrame(draw);
        }
        draw();

        // === SISTEMA DE EXPORTACIÓN ===
        function exportImage(ratioStr) {
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            
            let realW = window.innerWidth;
            let realH = window.innerHeight;
            let rW = ratioStr === '16:9' ? 16 : 3;
            let rH = ratioStr === '16:9' ? 9 : 4;

            let cropWidth = realW;
            let cropHeight = (realW / rW) * rH;

            if (cropHeight > realH) {
                cropHeight = realH;
                cropWidth = (realH / rH) * rW;
            }

            tempCanvas.width = cropWidth;
            tempCanvas.height = cropHeight;

            let sX = (realW - cropWidth) / 2;
            let sY = (realH - cropHeight) / 2;
            
            tCtx.drawImage(canvas, 0, 0, width, height, -sX, -sY, realW, realH);

            const link = document.createElement('a');
            link.download = `vostok_gen_${ratioStr.replace(':','x')}.png`;
            link.href = tempCanvas.toDataURL('image/png', 1.0);
            link.click();
        }

        let mediaRecorder;
        let recordedChunks = [];
        
        function exportVideo() {
            const btn = document.getElementById('btnVideo');
            if (btn.classList.contains('recording')) return; 
            
            btn.classList.add('recording');
            btn.innerHTML = `<span class="icon">🔴</span> REC`;
            recordedChunks = [];

            const stream = canvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = `vostok_gen.webm`;
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
                
                btn.classList.remove('recording');
                btn.innerHTML = `<span class="icon">🎥</span> REC`;
            };

            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 5000);
        }

        function exportGIF() {
            if (typeof GIF === 'undefined') {
                alert("GIF.js inicializando, intenta de nuevo.");
                return;
            }
            
            const btn = document.getElementById('btnGif');
            if (btn.classList.contains('recording')) return;
            
            btn.classList.add('recording');
            btn.innerHTML = `<span class="icon">⏳</span> WAIT`;

            const gifCanvas = document.createElement('canvas');
            gifCanvas.width = 480; 
            gifCanvas.height = 320;
            const gCtx = gifCanvas.getContext('2d');

            const gif = new GIF({
                workers: 2,
                quality: 6,
                width: 480,
                height: 320,
                workerScript: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'
            });

            let framesCaptured = 0;
            const maxFrames = 40; 

            function captureFrame() {
                gCtx.drawImage(canvas, 0, 0, width, height, 0, 0, 480, 320);
                gif.addFrame(gCtx, {copy: true, delay: 35});
                
                framesCaptured++;
                if(framesCaptured < maxFrames) {
                    requestAnimationFrame(captureFrame);
                } else {
                    btn.innerHTML = `<span class="icon">⚙️</span> PROC`;
                    gif.render();
                }
            }

            gif.on('finished', function(blob) {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = 'vostok_gen.gif';
                link.href = url;
                link.click();
                
                btn.classList.remove('recording');
                btn.innerHTML = `<span class="icon">🎞️</span> GIF`;
            });

            captureFrame();
        }
    </script>
</body>
</html>
