 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Gen v2.1 - Vertical Halftone</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        /* === UI/UX RESET & BASE === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #020412;
            color: #FFFFFF;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* === CONTENEDORES === */
        .visual-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* Canvas estirado para maximizar el efecto blur natural */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* === TEXTURAS (Halftone + Grano Analógico) === */
        .texture-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Patrón de puntos Semitono */
            background-image: radial-gradient(rgba(2, 4, 18, 0.4) 1px, transparent 1px);
            background-size: 4px 4px;
            mix-blend-mode: overlay;
            pointer-events: none;
            z-index: 5;
        }

        /* === INTERFAZ DE USUARIO === */
        .header-title {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            background: rgba(6, 12, 49, 0.3);
            backdrop-filter: blur(10px);
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            border: 1px solid rgba(186, 213, 239, 0.15);
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            z-index: 10;
        }

        .ui-panel {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(6, 12, 49, 0.4);
            backdrop-filter: blur(16px);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid rgba(186, 213, 239, 0.2);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
            width: 90%;
            max-width: 650px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        /* Layout interno del panel */
        .panel-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .temp-display {
            font-size: 2.5rem;
            font-weight: 300;
            min-width: 120px;
            text-shadow: 0 2px 10px rgba(186, 213, 239, 0.3);
        }

        .slider-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: relative;
        }

        .slider-wrapper span {
            font-size: 0.85rem;
            color: #BAD5EF;
            opacity: 0.8;
        }

        input[type=range] {
            flex-grow: 1;
            -webkit-appearance: none;
            height: 6px;
            background: linear-gradient(to right, #060C31, #BAD5EF, #FFFFFF);
            border-radius: 3px;
            outline: none;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px; height: 30px; /* Thumb más rectangular y elegante */
            border-radius: 4px;
            background: #FFFFFF;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255,255,255,0.6);
        }

        .export-controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            color: #BAD5EF;
            border: 1px solid rgba(186, 213, 239, 0.3);
            padding: 0.7rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            text-align: center;
        }

        button:hover {
            background: rgba(186, 213, 239, 0.2);
            color: #FFFFFF;
            border-color: #FFFFFF;
        }

        button.recording {
            background: #e74c3c;
            color: white;
            border-color: #e74c3c;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

    </style>
</head>
<body>

    <div class="visual-container">
        <div class="header-title">Vostok Station, Antarctica | Frost Gen v2.1</div>
        
        <canvas id="fluidCanvas"></canvas>
        <div class="texture-overlay"></div>
        
        <div class="ui-panel">
            <div class="panel-top">
                <div class="temp-display" id="tempDisplay">-45°C</div>
                <div class="slider-wrapper">
                    <span>-89</span>
                    <input type="range" id="tempSlider" min="-89" max="0" value="-45">
                    <span>0</span>
                </div>
            </div>
            
            <div class="export-controls">
                <button onclick="exportImage('16:9')">📷 Img 16:9</button>
                <button onclick="exportImage('3:4')">📷 Img 3:4</button>
                <button onclick="exportGIF()" id="btnGif">🎞️ Export GIF</button>
                <button onclick="exportVideo()" id="btnVideo">🎥 Export WebM</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('fluidCanvas');
        const ctx = canvas.getContext('2d');
        const tempSlider = document.getElementById('tempSlider');
        const tempDisplay = document.getElementById('tempDisplay');
        
        let width, height;
        let time = 0;

        // Paleta base
        const colors = {
            abyss: '#060C31',
            royal: '#16267E',
            ice: '#BAD5EF',
            white: '#FFFFFF'
        };

        function resize() {
            // Reducimos la resolución interna a la mitad para mejorar el rendimiento del blur
            // El CSS se encargará de estirarlo, dando un blur natural extra.
            width = window.innerWidth / 1.5;
            height = window.innerHeight / 1.5;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // Actualizar UI
        tempSlider.addEventListener('input', (e) => {
            tempDisplay.textContent = `${e.target.value}°C`;
        });

        // --- SISTEMA GENERATIVO VERTICAL ---
        function draw() {
            ctx.fillStyle = colors.abyss;
            ctx.fillRect(0, 0, width, height);

            let tempValue = Math.abs(parseInt(tempSlider.value)); 
            let coldFactor = tempValue / 89; // 0 (Blanco/Ice) a 1 (Abyss/Royal)

            // Aplicamos un desenfoque extremo para lograr el efecto "líquido/gradiente fotográfico"
            ctx.filter = 'blur(50px)';

            // Dibujamos bandas verticales que ondulan de izquierda a derecha
            const bands = 5;
            for (let i = 0; i <= bands; i++) {
                ctx.beginPath();
                
                // Empezamos arriba
                let startX = (width / bands) * i;
                ctx.moveTo(startX, -50);

                // Bajamos por el eje Y
                for (let y = 0; y <= height + 50; y += 40) {
                    // Matemáticas para el viento vertical
                    let wave1 = Math.sin((y * 0.003) - (time * 0.8) + i) * 150;
                    let wave2 = Math.cos((y * 0.005) + (time * 1.2) - i) * 80 * coldFactor;
                    
                    ctx.lineTo(startX + wave1 + wave2, y);
                }
                
                // Cerramos la forma hacia la izquierda para rellenar
                ctx.lineTo(0, height + 50);
                ctx.lineTo(0, -50);
                ctx.closePath();

                // Lógica de color según el slider
                let gradientColors = [colors.white, colors.ice, colors.royal, colors.abyss];
                // Mientras más frío, el índice de color se mueve hacia los oscuros
                let colorIndex = Math.min(3, Math.floor((i / bands) * 2 + (coldFactor * 2)));
                
                ctx.fillStyle = gradientColors[colorIndex];
                ctx.globalAlpha = 0.6 + (Math.sin(time + i) * 0.2); // Parpadeo suave
                ctx.fill();
            }

            // Añadir un destello central blanco/celeste si hace menos frío
            if (coldFactor < 0.6) {
                ctx.beginPath();
                ctx.arc(width/2 + Math.sin(time)*50, height/2, width/3, 0, Math.PI * 2);
                ctx.fillStyle = colors.ice;
                ctx.globalAlpha = 0.3 * (1 - coldFactor);
                ctx.fill();
            }

            ctx.filter = 'none'; // Resetear filtro por seguridad

            // Velocidad base + incremento si hace más frío
            time += 0.015 + (coldFactor * 0.01); 
            requestAnimationFrame(draw);
        }
        draw();

        // --- SISTEMA DE EXPORTACIÓN ---

        // Función auxiliar para dibujar el semitono en el canvas exportado
        function applyHalftoneToCanvas(exportCtx, w, h) {
            exportCtx.fillStyle = 'rgba(2, 4, 18, 0.3)';
            for(let x = 0; x < w; x += 4) {
                for(let y = 0; y < h; y += 4) {
                    if((x/4 + y/4) % 2 === 0) {
                        exportCtx.fillRect(x, y, 2, 2);
                    }
                }
            }
        }

        function exportImage(ratioStr) {
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            
            // Trabajamos sobre la resolución real de la pantalla para el export
            let realW = window.innerWidth;
            let realH = window.innerHeight;

            let rW = ratioStr === '16:9' ? 16 : 3;
            let rH = ratioStr === '16:9' ? 9 : 4;

            let cropWidth = realW;
            let cropHeight = (realW / rW) * rH;

            if (cropHeight > realH) {
                cropHeight = realH;
                cropWidth = (realH / rH) * rW;
            }

            tempCanvas.width = cropWidth;
            tempCanvas.height = cropHeight;

            let sX = (realW - cropWidth) / 2;
            let sY = (realH - cropHeight) / 2;
            
            // Dibujar el estado actual (estirándolo desde nuestra resolución interna optimizada)
            tCtx.drawImage(canvas, 0, 0, width, height, -sX, -sY, realW, realH);
            
            // Aplicar el efecto analógico directo a la imagen
            applyHalftoneToCanvas(tCtx, cropWidth, cropHeight);

            const link = document.createElement('a');
            link.download = `frost_gen_${ratioStr.replace(':','x')}.png`;
            link.href = tempCanvas.toDataURL('image/png', 1.0);
            link.click();
        }

        let mediaRecorder;
        let recordedChunks = [];
        
        function exportVideo() {
            const btn = document.getElementById('btnVideo');
            if (btn.classList.contains('recording')) return; 
            
            btn.classList.add('recording');
            btn.textContent = "🔴 Grabando (5s)...";
            recordedChunks = [];

            const stream = canvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = `frost_gen_loop.webm`;
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
                
                btn.classList.remove('recording');
                btn.textContent = "🎥 Export WebM";
            };

            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 5000);
        }

        function exportGIF() {
            if (typeof GIF === 'undefined') {
                alert("GIF.js cargando, espera un segundo.");
                return;
            }
            
            const btn = document.getElementById('btnGif');
            if (btn.classList.contains('recording')) return;
            
            btn.classList.add('recording');
            btn.textContent = "⏳ Generando...";

            const gifCanvas = document.createElement('canvas');
            // Mantenemos el GIF pequeño (400x300) para evitar archivos gigantes
            gifCanvas.width = 400; 
            gifCanvas.height = 300;
            const gCtx = gifCanvas.getContext('2d');

            const gif = new GIF({
                workers: 2,
                quality: 10,
                width: 400,
                height: 300,
                workerScript: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'
            });

            let framesCaptured = 0;
            const maxFrames = 45; // 1.5 segundos a 30fps

            function captureFrame() {
                gCtx.drawImage(canvas, 0, 0, 400, 300);
                // Aplicamos semitono sutil al GIF
                applyHalftoneToCanvas(gCtx, 400, 300);

                gif.addFrame(gCtx, {copy: true, delay: 33});
                
                framesCaptured++;
                if(framesCaptured < maxFrames) {
                    requestAnimationFrame(captureFrame);
                } else {
                    btn.textContent = "⚙️ Procesando...";
                    gif.render();
                }
            }

            gif.on('finished', function(blob) {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = 'frost_gen.gif';
                link.href = url;
                link.click();
                
                btn.classList.remove('recording');
                btn.textContent = "🎞️ Export GIF";
            });

            captureFrame();
        }
    </script>
</body>
</html>
