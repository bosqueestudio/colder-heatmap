 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOSTOK [SYS.CORE] - Frost Gen v5.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        /* === RESET & HUD BASE === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #BAD5EF; /* Azul hielo como color de texto base */
            font-family: 'Space Mono', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            text-transform: uppercase;
            font-size: 12px;
        }

        #fluidCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        /* === GRID/SCANLINES OVERLAY OPCIONAL === */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            z-index: 5;
            pointer-events: none;
        }

        /* === CAPA DE UI === */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none; 
            display: flex;
            justify-content: space-between;
            padding: 2rem;
        }

        .panel { pointer-events: auto; }

        /* === HUD CARDS (BRUTALIST) === */
        .hud-box {
            background: rgba(2, 4, 12, 0.85); 
            border: 1px solid rgba(186, 213, 239, 0.3);
            border-left: 4px solid #BAD5EF; /* Acento HUD */
            padding: 1.5rem;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-shadow: 0 0 20px rgba(6, 12, 49, 0.8);
        }

        .sys-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(186, 213, 239, 0.2);
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .sys-title { font-weight: 700; color: #FFFFFF; letter-spacing: 2px; }
        .sys-status { color: #50e3c2; animation: blink 2s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* === DATA READOUT (TEMPERATURE) === */
        .readout-container {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .gauge-ring {
            position: relative;
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 1px solid rgba(186, 213, 239, 0.2);
            display: flex; justify-content: center; align-items: center;
        }

        .gauge-fill {
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border-radius: 50%;
            background: conic-gradient(#BAD5EF 0%, #BAD5EF var(--fill-pct, 50%), transparent var(--fill-pct, 50%), transparent 100%);
            mask: radial-gradient(transparent 60%, black 62%);
            -webkit-mask: radial-gradient(transparent 60%, black 62%);
        }

        .temp-val { font-size: 1.5rem; font-weight: 700; color: #FFF; z-index: 2; }
        
        .data-labels div { margin-bottom: 4px; }
        .lbl-main { color: #FFF; font-weight: 700; }
        .lbl-sub { color: rgba(186, 213, 239, 0.6); font-size: 10px; }

        /* === SLIDERS (TECH STYLE) === */
        .control-group { display: flex; flex-direction: column; gap: 0.8rem; }
        
        .ctrl-header {
            display: flex; justify-content: space-between;
            font-size: 10px; color: #BAD5EF;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%; height: 2px;
            background: rgba(186, 213, 239, 0.3);
            outline: none;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px; height: 18px;
            background: #BAD5EF;
            cursor: pointer;
            border-radius: 0; /* Rectangular tech thumb */
        }
        
        input[type=range]::-webkit-slider-thumb:hover { background: #FFFFFF; }

        /* === TOOLBAR DERECHA === */
        .right-panel { display: flex; flex-direction: column; align-items: flex-end; gap: 1rem; }

        .btn-tech {
            background: rgba(2, 4, 12, 0.8);
            color: #BAD5EF;
            border: 1px solid rgba(186, 213, 239, 0.3);
            padding: 0.8rem;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.2s;
            width: 120px;
            text-align: left;
            display: flex;
            justify-content: space-between;
        }

        .btn-tech:hover {
            background: rgba(186, 213, 239, 0.2);
            color: #FFF;
            border-color: #FFF;
        }

        .btn-tech.recording {
            background: #4a0000;
            color: #ff4444;
            border-color: #ff4444;
            animation: blink 1s infinite;
        }

        .coord-overlay {
            position: absolute;
            bottom: 2rem; left: 2rem;
            color: rgba(186, 213, 239, 0.4);
            font-size: 10px;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <canvas id="fluidCanvas"></canvas>
    <div class="scanlines"></div>
    
    <div class="ui-layer">
        
        <div class="panel left-panel">
            <div class="hud-box">
                <div class="sys-header">
                    <span class="sys-title">VOSTOK_STATION</span>
                    <span class="sys-status">[ONLINE]</span>
                </div>
                
                <div class="readout-container">
                    <div class="gauge-ring" id="ringContainer" style="--fill-pct: 50%;">
                        <div class="gauge-fill"></div>
                        <div class="temp-val" id="tempDisplay">-45°</div>
                    </div>
                    <div class="data-labels">
                        <div class="lbl-main">CORE_THERMAL</div>
                        <div class="lbl-sub">LAT: -78.4645</div>
                        <div class="lbl-sub">LON: 106.8340</div>
                    </div>
                </div>

                <div class="control-group">
                    <div class="ctrl-header">
                        <span>CALIBRATE_TEMP</span>
                        <span id="tempValSub">-45.00 C</span>
                    </div>
                    <input type="range" id="tempSlider" min="-89" max="0" value="-45">
                </div>

                <div class="control-group" style="margin-top: 10px;">
                    <div class="ctrl-header">
                        <span>PLASMA_DENSITY</span>
                        <span id="sizeValueDisplay">18 PX</span>
                    </div>
                    <input type="range" id="sizeSlider" min="8" max="35" value="18">
                </div>
            </div>
        </div>

        <div class="panel right-panel">
            <button class="btn-tech" onclick="exportImage('16:9')">
                <span>IMG_16:9</span> <span>[+]</span>
            </button>
            <button class="btn-tech" onclick="exportImage('3:4')">
                <span>IMG_3:4</span> <span>[+]</span>
            </button>
            <button class="btn-tech" onclick="exportGIF()" id="btnGif" style="margin-top: 1rem;">
                <span>EXP_GIF</span> <span>[>]</span>
            </button>
            <button class="btn-tech" onclick="exportVideo()" id="btnVideo">
                <span>REC_WEBM</span> <span>[O]</span>
            </button>
        </div>

        <div class="coord-overlay">
            RENDER_ENGINE: FROST_GEN_V5<br>
            OUTPUT: FLUID_CELLULAR_AUTOMATA
        </div>
    </div>

    <script>
        const canvas = document.getElementById('fluidCanvas');
        const ctx = canvas.getContext('2d');
        const tempSlider = document.getElementById('tempSlider');
        const tempDisplay = document.getElementById('tempDisplay');
        const tempValSub = document.getElementById('tempValSub');
        const ringContainer = document.getElementById('ringContainer');
        const sizeSlider = document.getElementById('sizeSlider');
        const sizeValueDisplay = document.getElementById('sizeValueDisplay');
        
        let width, height;
        let time = 0;
        let gridSpacing = 18; 

        // Paleta base recuperada 
        const hexPalette = ['#010208', '#060C31', '#132378', '#2244C4', '#BAD5EF', '#ffffff'];
        
        const rgbPalette = hexPalette.map(hex => {
            let v = parseInt(hex.replace('#', ''), 16);
            return { r: (v >> 16) & 255, g: (v >> 8) & 255, b: v & 255 };
        });

        // Interpolación lineal de color suave
        function getInterpolatedColor(intensity, alpha = 1) {
            let t = Math.max(0, Math.min(0.999, intensity));
            let scaledT = t * (rgbPalette.length - 1);
            let index = Math.floor(scaledT);
            let frac = scaledT - index;
            
            let c1 = rgbPalette[index];
            let c2 = rgbPalette[index + 1];
            
            let r = Math.round(c1.r + (c2.r - c1.r) * frac);
            let g = Math.round(c1.g + (c2.g - c1.g) * frac);
            let b = Math.round(c1.b + (c2.b - c1.b) * frac);
            
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // Ruido Fotográfico
        const noiseCanvas = document.createElement('canvas');
        const noiseCtx = noiseCanvas.getContext('2d');
        function generateNoise() {
            noiseCanvas.width = width;
            noiseCanvas.height = height;
            const imgData = noiseCtx.createImageData(width, height);
            const buffer = new Uint32Array(imgData.data.buffer);
            for (let i = 0; i < buffer.length; i++) {
                let shade = Math.random() * 255;
                buffer[i] = (12 << 24) | (shade << 16) | (shade << 8) | shade; // 12/255 opacidad
            }
            noiseCtx.putImageData(imgData, 0, 0);
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            generateNoise();
        }
        window.addEventListener('resize', resize);
        resize();

        function updateUI() {
            let temp = parseInt(tempSlider.value);
            tempDisplay.textContent = `${temp}°`;
            tempValSub.textContent = `${temp}.00 C`;
            let pct = ((temp + 89) / 89) * 100;
            ringContainer.style.setProperty('--fill-pct', `${pct}%`);
        }

        tempSlider.addEventListener('input', updateUI);
        
        sizeSlider.addEventListener('input', (e) => {
            gridSpacing = parseInt(e.target.value);
            sizeValueDisplay.textContent = `${gridSpacing} PX`;
        });

        updateUI();

        // === MOTOR GENERATIVO OPTIMIZADO (v5.0) ===
        function draw() {
            ctx.fillStyle = '#000002'; 
            ctx.fillRect(0, 0, width, height);

            let tempValue = Math.abs(parseInt(tempSlider.value)); 
            let coldFactor = tempValue / 89; 

            // Usamos source-over con opacidad 0.9 para que los colores se superpongan
            // pero sin quemarse hacia el blanco infinito.
            ctx.globalCompositeOperation = 'source-over';

            for (let x = -gridSpacing; x < width + gridSpacing; x += gridSpacing) {
                for (let y = -gridSpacing; y < height + gridSpacing; y += gridSpacing) {
                    
                    let wave1 = Math.sin((x * 0.003) + time);
                    let wave2 = Math.cos((y * 0.004) - time);
                    let wave3 = Math.sin(((x + y) * 0.002) + time * 0.4);
                    
                    let rawIntensity = (wave1 + wave2 + wave3 + 3) / 6;
                    let energyBias = 0.20 - (coldFactor * 0.55); 
                    let intensity = Math.max(0.01, Math.min(0.99, rawIntensity + energyBias));

                    // El radio de solapamiento ideal para fluidez sin dañar FPS
                    let maxRadius = gridSpacing * 1.4; 
                    let radius = intensity * maxRadius;

                    if (radius < 1) continue;

                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    // Dibujamos formas sólidas pero ligeramente translúcidas (0.9)
                    ctx.fillStyle = getInterpolatedColor(intensity, 0.9);
                    ctx.fill();
                }
            }

            // Aplicar Ruido
            ctx.globalCompositeOperation = 'overlay'; 
            ctx.drawImage(noiseCanvas, 0, 0);
            ctx.globalCompositeOperation = 'source-over';

            time += 0.012 + (coldFactor * 0.008); 
            requestAnimationFrame(draw);
        }
        draw();

        // === SISTEMA DE EXPORTACIÓN ===
        function exportImage(ratioStr) {
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            let realW = window.innerWidth, realH = window.innerHeight;
            let rW = ratioStr === '16:9' ? 16 : 3, rH = ratioStr === '16:9' ? 9 : 4;
            let cropWidth = realW, cropHeight = (realW / rW) * rH;
            if (cropHeight > realH) { cropHeight = realH; cropWidth = (realH / rH) * rW; }
            tempCanvas.width = cropWidth; tempCanvas.height = cropHeight;
            let sX = (realW - cropWidth) / 2, sY = (realH - cropHeight) / 2;
            tCtx.drawImage(canvas, 0, 0, width, height, -sX, -sY, realW, realH);
            const link = document.createElement('a');
            link.download = `vostok_sys_${ratioStr.replace(':','x')}.png`;
            link.href = tempCanvas.toDataURL('image/png', 1.0);
            link.click();
        }

        let mediaRecorder; let recordedChunks = [];
        function exportVideo() {
            const btn = document.getElementById('btnVideo');
            if (btn.classList.contains('recording')) return; 
            btn.classList.add('recording'); btn.innerHTML = `<span>REC...</span> <span>[!]</span>`;
            recordedChunks = [];
            const stream = canvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a'); link.download = `vostok_sys.webm`; link.href = url; link.click();
                URL.revokeObjectURL(url);
                btn.classList.remove('recording'); btn.innerHTML = `<span>REC_WEBM</span> <span>[O]</span>`;
            };
            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 5000);
        }

        function exportGIF() {
            if (typeof GIF === 'undefined') { alert("GIF.js inicializando."); return; }
            const btn = document.getElementById('btnGif');
            if (btn.classList.contains('recording')) return;
            btn.classList.add('recording'); btn.innerHTML = `<span>WAIT...</span> <span>[!]</span>`;
            const gifCanvas = document.createElement('canvas');
            gifCanvas.width = 480; gifCanvas.height = 320;
            const gCtx = gifCanvas.getContext('2d');
            const gif = new GIF({ workers: 2, quality: 6, width: 480, height: 320, workerScript: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js' });
            let framesCaptured = 0; const maxFrames = 40; 
            function captureFrame() {
                gCtx.drawImage(canvas, 0, 0, width, height, 0, 0, 480, 320);
                gif.addFrame(gCtx, {copy: true, delay: 35});
                framesCaptured++;
                if(framesCaptured < maxFrames) { requestAnimationFrame(captureFrame); } 
                else { btn.innerHTML = `<span>PROC...</span> <span>[!]</span>`; gif.render(); }
            }
            gif.on('finished', function(blob) {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a'); link.download = 'vostok_sys.gif'; link.href = url; link.click();
                btn.classList.remove('recording'); btn.innerHTML = `<span>EXP_GIF</span> <span>[>]</span>`;
            });
            captureFrame();
        }
    </script>
</body>
</html>
