<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vostok Weather | Fluid Frost Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* === RESET & BASE === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #BAD5EF;
            font-family: 'Space Mono', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            text-transform: uppercase;
            font-size: 12px;
        }

        #fluidCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            z-index: 5;
            pointer-events: none;
        }

        /* === UI LAYER === */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none; 
            display: flex;
            padding: 2rem;
            align-items: center;
        }

        /* === COMMAND CENTER CARD === */
        .command-center {
            pointer-events: auto;
            background: rgba(2, 4, 12, 0.85); 
            border: 1px solid rgba(186, 213, 239, 0.3);
            border-left: 4px solid #BAD5EF;
            padding: 1.5rem;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            transition: opacity 0.6s ease; /* Transición suave para el auto-fade */
            opacity: 1;
        }

        /* HEADER */
        .header {
            display: flex; justify-content: space-between;
            border-bottom: 1px solid rgba(186, 213, 239, 0.2);
            padding-bottom: 0.8rem;
        }
        .app-title { font-weight: 700; color: #FFFFFF; letter-spacing: 1px; }
        .live-indicator { color: #50e3c2; animation: blink 2s infinite; display: flex; align-items: center; gap: 4px;}
        .dot { width: 6px; height: 6px; background-color: #50e3c2; border-radius: 50%; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* TEMPERATURE READOUT */
        .readout { display: flex; align-items: center; gap: 1.5rem; }
        
        .gauge {
            position: relative; width: 70px; height: 70px;
            border-radius: 50%; border: 1px solid rgba(186, 213, 239, 0.2);
            display: flex; justify-content: center; align-items: center;
        }
        .gauge-fill {
            position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px;
            border-radius: 50%;
            background: conic-gradient(#BAD5EF 0%, #BAD5EF var(--fill-pct, 50%), transparent var(--fill-pct, 50%), transparent 100%);
            mask: radial-gradient(transparent 60%, black 62%);
            -webkit-mask: radial-gradient(transparent 60%, black 62%);
        }
        .temp-val { font-size: 1.4rem; font-weight: 700; color: #FFF; z-index: 2; }
        
        .labels div { margin-bottom: 4px; }
        .lbl-title { color: #FFF; font-weight: 700; font-size: 14px;}
        .lbl-desc { color: rgba(186, 213, 239, 0.6); font-size: 10px; }

        /* SLIDERS */
        .controls { display: flex; flex-direction: column; gap: 1.2rem; }
        .slider-wrapper { display: flex; flex-direction: column; gap: 0.6rem; }
        .slider-header { display: flex; justify-content: space-between; font-size: 10px; color: #BAD5EF; }
        
        input[type=range] {
            -webkit-appearance: none; width: 100%; height: 2px;
            background: rgba(186, 213, 239, 0.3); outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 10px; height: 18px;
            background: #BAD5EF; cursor: pointer; border-radius: 0; 
        }
        input[type=range]::-webkit-slider-thumb:hover { background: #FFFFFF; }

        /* ACTIONS SECTION */
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-top: 0.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(186, 213, 239, 0.2);
        }

        .btn {
            background: rgba(2, 4, 12, 0.8); color: #BAD5EF;
            border: 1px solid rgba(186, 213, 239, 0.3);
            padding: 0.8rem 0.5rem; cursor: pointer;
            font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
            transition: all 0.2s; text-align: center;
        }

        .btn:hover { background: rgba(186, 213, 239, 0.2); color: #FFF; border-color: #FFF; }
        .btn.full { grid-column: 1 / -1; }
        .btn.recording { background: #4a0000; color: #ff4444; border-color: #ff4444; animation: blink 1s infinite; }

    </style>
</head>
<body>

    <canvas id="fluidCanvas"></canvas>
    <div class="scanlines"></div>
    
    <div class="ui-layer">
        
        <div class="command-center" id="commandCenter">
            
            <div class="header">
                <span class="app-title">VOSTOK WEATHER</span>
                <span class="live-indicator"><span class="dot"></span> LIVE</span>
            </div>
            
            <div class="readout">
                <div class="gauge" id="ringContainer" style="--fill-pct: 50%;">
                    <div class="gauge-fill"></div>
                    <div class="temp-val" id="tempDisplay">-45°</div>
                </div>
                <div class="labels">
                    <div class="lbl-title">CURRENT TEMP</div>
                    <div class="lbl-desc">ANTARCTIC CONDITIONS</div>
                </div>
            </div>

            <div class="controls">
                <div class="slider-wrapper">
                    <div class="slider-header">
                        <span>TEMPERATURE</span>
                        <span id="tempValSub">-45°C</span>
                    </div>
                    <input type="range" id="tempSlider" min="-89" max="0" value="-45">
                </div>

                <div class="slider-wrapper">
                    <div class="slider-header">
                        <span>STORM DENSITY</span>
                        <span id="sizeValueDisplay">18 PX</span>
                    </div>
                    <input type="range" id="sizeSlider" min="8" max="35" value="18">
                </div>
            </div>

            <div class="actions">
                <button class="btn" onclick="exportImage('16:9')">IMAGE 16:9</button>
                <button class="btn" onclick="exportImage('4:5')">IMAGE 4:5</button>
                <button class="btn full" onclick="exportVideo()" id="btnVideo">DOWNLOAD VIDEO</button>
            </div>

        </div>

    </div>

    <script>
        const canvas = document.getElementById('fluidCanvas');
        const ctx = canvas.getContext('2d');
        const tempSlider = document.getElementById('tempSlider');
        const tempDisplay = document.getElementById('tempDisplay');
        const tempValSub = document.getElementById('tempValSub');
        const ringContainer = document.getElementById('ringContainer');
        const sizeSlider = document.getElementById('sizeSlider');
        const sizeValueDisplay = document.getElementById('sizeValueDisplay');
        const commandCenter = document.getElementById('commandCenter');
        
        let width, height;
        let time = 0;
        let gridSpacing = 18; 

        // AUTO-FADE UI LOGIC
        let idleTimer;
        function resetIdleTimer() {
            commandCenter.style.opacity = '1';
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                commandCenter.style.opacity = '0';
            }, 2000); // Se oculta tras 2 segundos de inactividad
        }
        window.addEventListener('mousemove', resetIdleTimer);
        window.addEventListener('mousedown', resetIdleTimer);
        window.addEventListener('touchstart', resetIdleTimer);
        resetIdleTimer(); // Inicializar

        // 13-Tone Deep Palette
        const hexPalette = [
            '#000000', '#010206', '#02040D', '#030614', '#060B24', 
            '#0A153A', '#101D5C', '#162A82', '#1C37A3', '#2244C4', 
            '#7ba4cf', '#BAD5EF', '#ffffff' 
        ];
        
        const rgbPalette = hexPalette.map(hex => {
            let v = parseInt(hex.replace('#', ''), 16);
            return { r: (v >> 16) & 255, g: (v >> 8) & 255, b: v & 255 };
        });

        function getInterpolatedColor(intensity, alpha = 1) {
            let t = Math.max(0, Math.min(0.999, intensity));
            let scaledT = t * (rgbPalette.length - 1);
            let index = Math.floor(scaledT);
            let frac = scaledT - index;
            
            let c1 = rgbPalette[index];
            let c2 = rgbPalette[index + 1];
            
            let r = Math.round(c1.r + (c2.r - c1.r) * frac);
            let g = Math.round(c1.g + (c2.g - c1.g) * frac);
            let b = Math.round(c1.b + (c2.b - c1.b) * frac);
            
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        const noiseCanvas = document.createElement('canvas');
        const noiseCtx = noiseCanvas.getContext('2d');
        function generateNoise() {
            noiseCanvas.width = width; noiseCanvas.height = height;
            const imgData = noiseCtx.createImageData(width, height);
            const buffer = new Uint32Array(imgData.data.buffer);
            for (let i = 0; i < buffer.length; i++) {
                let shade = Math.random() * 255;
                buffer[i] = (14 << 24) | (shade << 16) | (shade << 8) | shade; 
            }
            noiseCtx.putImageData(imgData, 0, 0);
        }

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            generateNoise();
        }
        window.addEventListener('resize', resize); resize();

        function updateUI() {
            let temp = parseInt(tempSlider.value);
            tempDisplay.textContent = `${temp}°`;
            tempValSub.textContent = `${temp}°C`;
            let pct = ((temp + 89) / 89) * 100;
            ringContainer.style.setProperty('--fill-pct', `${pct}%`);
        }
        tempSlider.addEventListener('input', updateUI);
        sizeSlider.addEventListener('input', (e) => {
            gridSpacing = parseInt(e.target.value);
            sizeValueDisplay.textContent = `${gridSpacing} PX`;
        });
        updateUI();

        // GENERATIVE ENGINE
        function draw() {
            ctx.fillStyle = '#000000'; 
            ctx.fillRect(0, 0, width, height);

            let tempValue = Math.abs(parseInt(tempSlider.value)); 
            let coldFactor = tempValue / 89; 

            ctx.globalCompositeOperation = 'source-over';

            for (let x = -gridSpacing; x < width + gridSpacing; x += gridSpacing) {
                for (let y = -gridSpacing; y < height + gridSpacing; y += gridSpacing) {
                    
                    let wave1 = Math.sin((x * 0.003) + time);
                    let wave2 = Math.cos((y * 0.004) - time);
                    let wave3 = Math.sin(((x + y) * 0.002) + time * 0.4);
                    
                    let rawIntensity = (wave1 + wave2 + wave3 + 3) / 6;
                    let energyBias = 0.20 - (coldFactor * 0.45); 
                    let intensity = Math.max(0.0, Math.min(0.999, rawIntensity + energyBias));

                    let maxRadius = gridSpacing * 1.45; 
                    let radius = intensity * maxRadius;

                    if (radius < 1) continue;

                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = getInterpolatedColor(intensity, 0.95);
                    ctx.fill();
                }
            }

            ctx.globalCompositeOperation = 'overlay'; 
            ctx.drawImage(noiseCanvas, 0, 0);
            ctx.globalCompositeOperation = 'source-over';

            time += 0.012 + (coldFactor * 0.008); 
            requestAnimationFrame(draw);
        }
        draw();

        // EXPORT SYSTEM
        function exportImage(ratioStr) {
            const tempCanvas = document.createElement('canvas'); const tCtx = tempCanvas.getContext('2d');
            let realW = window.innerWidth, realH = window.innerHeight;
            
            // Adjusted logic for 4:5 ratio
            let rW = ratioStr === '16:9' ? 16 : 4; 
            let rH = ratioStr === '16:9' ? 9 : 5;
            
            let cropWidth = realW, cropHeight = (realW / rW) * rH;
            if (cropHeight > realH) { cropHeight = realH; cropWidth = (realH / rH) * rW; }
            
            tempCanvas.width = cropWidth; tempCanvas.height = cropHeight;
            let sX = (realW - cropWidth) / 2, sY = (realH - cropHeight) / 2;
            
            tCtx.drawImage(canvas, 0, 0, width, height, -sX, -sY, realW, realH);
            
            const link = document.createElement('a'); 
            link.download = `vostok_weather_${ratioStr.replace(':','x')}.png`;
            link.href = tempCanvas.toDataURL('image/png', 1.0); link.click();
        }

        let mediaRecorder; let recordedChunks = [];
        function exportVideo() {
            const btn = document.getElementById('btnVideo'); if (btn.classList.contains('recording')) return; 
            btn.classList.add('recording'); btn.textContent = `RECORDING... PLEASE WAIT`; recordedChunks = [];
            
            const stream = canvas.captureStream(30); 
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' }); 
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a'); 
                link.download = `vostok_weather_render.webm`; 
                link.href = url; link.click();
                URL.revokeObjectURL(url); 
                btn.classList.remove('recording'); btn.textContent = `DOWNLOAD VIDEO`;
            };
            
            mediaRecorder.start(); setTimeout(() => mediaRecorder.stop(), 5000);
        }
    </script>
</body>
</html>
