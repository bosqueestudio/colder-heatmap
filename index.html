 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vostok Station | Frost Gen v3.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        /* === UI/UX RESET & BASE === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .visual-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* === INTERFAZ DE USUARIO === */
        .header-title {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            background: rgba(2, 4, 18, 0.4);
            backdrop-filter: blur(12px);
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            border: 1px solid rgba(186, 213, 239, 0.15);
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            z-index: 10;
        }

        .ui-panel {
            position: absolute;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(6, 12, 49, 0.35);
            backdrop-filter: blur(20px);
            padding: 1.8rem;
            border-radius: 16px;
            border: 1px solid rgba(186, 213, 239, 0.15);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
            width: 90%;
            max-width: 900px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }

        .ui-row-1 {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2.5rem;
        }

        .panel-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-grow: 1;
        }

        .temp-display {
            font-size: 3rem;
            font-weight: 300;
            min-width: 140px;
            letter-spacing: -1px;
            text-shadow: 0 4px 12px rgba(186, 213, 239, 0.3);
        }

        .slider-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .slider-wrapper span {
            font-size: 0.8rem;
            color: #BAD5EF;
            opacity: 0.6;
            font-weight: 600;
        }

        input[type=range] {
            flex-grow: 1;
            -webkit-appearance: none;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 24px;
            border-radius: 3px;
            background: #FFFFFF;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255,255,255,0.9);
            transition: transform 0.1s ease;
        }

        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }

        .panel-right {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.6rem;
            min-width: 260px;
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(218, 235, 255, 0.8);
            border: 1px solid rgba(186, 213, 239, 0.2);
            padding: 0.6rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.25s ease;
            text-align: center;
            font-weight: 500;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #FFFFFF;
            border-color: rgba(255, 255, 255, 0.6);
        }

        button.recording {
            background: #e74c3c;
            color: white;
            border-color: #e74c3c;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .ui-row-2 {
            background: rgba(6, 12, 49, 0.4);
            backdrop-filter: blur(12px);
            padding: 1.2rem;
            border-radius: 8px;
            border: 1px solid rgba(186, 213, 239, 0.15);
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .size-label {
            font-size: 0.9rem;
            color: #BAD5EF;
            min-width: 120px;
        }

        #sizeSliderWrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        #sizeSliderWrapper span {
            font-size: 0.8rem;
            color: #BAD5EF;
            opacity: 0.6;
        }

    </style>
</head>
<body>

    <div class="visual-container">
        <div class="header-title">Vostok Station, Antarctica | Frost Gen v3.0</div>
        
        <canvas id="fluidCanvas"></canvas>
        
        <div class="ui-panel">
            <div class="ui-row-1">
                <div class="panel-left">
                    <div class="temp-display" id="tempDisplay">-45°C</div>
                    <div class="slider-wrapper">
                        <span>-89</span>
                        <input type="range" id="tempSlider" min="-89" max="0" value="-45">
                        <span>0</span>
                    </div>
                </div>
                
                <div class="panel-right">
                    <button onclick="exportImage('16:9')">📸 Img 16:9</button>
                    <button onclick="exportImage('3:4')">📸 Img 3:4</button>
                    <button onclick="exportGIF()" id="btnGif">🎞️ Export GIF</button>
                    <button onclick="exportVideo()" id="btnVideo">🎥 Export WebM</button>
                </div>
            </div>

            <div class="ui-row-2">
                <div class="size-label">Halftone Size:</div>
                <div id="sizeSliderWrapper">
                    <span>Nítido</span>
                    <input type="range" id="sizeSlider" min="10" max="40" value="22">
                    <span>Granular</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('fluidCanvas');
        const ctx = canvas.getContext('2d');
        const tempSlider = document.getElementById('tempSlider');
        const tempDisplay = document.getElementById('tempDisplay');
        const sizeSlider = document.getElementById('sizeSlider');
        
        let width, height;
        let time = 0;

        let gridSpacing = 22; 

        // Paleta base 
        const palette = [
            '#010208', // 0: Negro Abisal
            '#060C31', // 1: Azul Muy Oscuro
            '#132378', // 2: Royal Transición
            '#2244C4', // 3: Azul Eléctrico
            '#BAD5EF', // 4: Hielo Claro
            '#ffffff'  // 5: Blanco Puro
        ];

        const glowThreshold = 3; 
        const glowColor = '#50e3c233'; 

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        tempSlider.addEventListener('input', (e) => {
            tempDisplay.textContent = `${e.target.value}°C`;
        });

        sizeSlider.addEventListener('input', (e) => {
            gridSpacing = parseInt(e.target.value);
        });

        // === MOTOR GENERATIVO CORREGIDO ===
        function draw() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);

            let tempValue = Math.abs(parseInt(tempSlider.value)); 
            let coldFactor = tempValue / 89; // 0 (0°C) a 1 (-89°C)

            for (let x = 0; x < width + gridSpacing; x += gridSpacing) {
                for (let y = 0; y < height + gridSpacing; y += gridSpacing) {
                    
                    let wave1 = Math.sin((x * 0.004) + time);
                    let wave2 = Math.cos((y * 0.005) - time);
                    let wave3 = Math.sin(((x + y) * 0.003) + time * 0.5);
                    
                    let intensity = (wave1 + wave2 + wave3 + 3) / 6;
                    
                    intensity -= (coldFactor * 0.15); 
                    intensity = Math.max(0, Math.min(0.99, intensity));

                    let maxRadius = gridSpacing * 0.75; 
                    let radius = intensity * maxRadius;

                    // Mapeo perfecto: 0°C (offset 3) usa índices 3,4,5. -89°C (offset 0) usa índices 0,1,2
                    let offset = Math.floor((1 - coldFactor) * 3); 
                    let localIndex = Math.floor(intensity * 3); 
                    let colorIndex = Math.min(palette.length - 1, offset + localIndex);

                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    
                    let c = palette[colorIndex];
                    
                    if (colorIndex >= glowThreshold) {
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = glowColor;
                    } else {
                        ctx.shadowBlur = 0;
                    }

                    ctx.fillStyle = c;
                    ctx.fill();
                }
            }

            time += 0.015 + (coldFactor * 0.01); 
            requestAnimationFrame(draw);
        }
        draw();

        // === EXPORTACIÓN ===
        function exportImage(ratioStr) {
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            
            let realW = window.innerWidth;
            let realH = window.innerHeight;
            let rW = ratioStr === '16:9' ? 16 : 3;
            let rH = ratioStr === '16:9' ? 9 : 4;

            let cropWidth = realW;
            let cropHeight = (realW / rW) * rH;

            if (cropHeight > realH) {
                cropHeight = realH;
                cropWidth = (realH / rH) * rW;
            }

            tempCanvas.width = cropWidth;
            tempCanvas.height = cropHeight;

            let sX = (realW - cropWidth) / 2;
            let sY = (realH - cropHeight) / 2;
            
            tCtx.drawImage(canvas, 0, 0, width, height, -sX, -sY, realW, realH);

            const link = document.createElement('a');
            link.download = `frost_gen_3_0_${ratioStr.replace(':','x')}.png`;
            link.href = tempCanvas.toDataURL('image/png', 1.0);
            link.click();
        }

        let mediaRecorder;
        let recordedChunks = [];
        
        function exportVideo() {
            const btn = document.getElementById('btnVideo');
            if (btn.classList.contains('recording')) return; 
            
            btn.classList.add('recording');
            btn.textContent = "🔴 Grabando (5s)...";
            recordedChunks = [];

            const stream = canvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = `frost_gen_3_0.webm`;
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
                
                btn.classList.remove('recording');
                btn.textContent = "🎥 Export WebM";
            };

            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 5000);
        }

        function exportGIF() {
            if (typeof GIF === 'undefined') {
                alert("GIF.js inicializando, intenta de nuevo.");
                return;
            }
            
            const btn = document.getElementById('btnGif');
            if (btn.classList.contains('recording')) return;
            
            btn.classList.add('recording');
            btn.textContent = "⏳ Procesando...";

            const gifCanvas = document.createElement('canvas');
            gifCanvas.width = 480; 
            gifCanvas.height = 320;
            const gCtx = gifCanvas.getContext('2d');

            const gif = new GIF({
                workers: 2,
                quality: 6,
                width: 480,
                height: 320,
                workerScript: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'
            });

            let framesCaptured = 0;
            const maxFrames = 40; 

            function captureFrame() {
                gCtx.drawImage(canvas, 0, 0, width, height, 0, 0, 480, 320);
                gif.addFrame(gCtx, {copy: true, delay: 35});
                
                framesCaptured++;
                if(framesCaptured < maxFrames) {
                    requestAnimationFrame(captureFrame);
                } else {
                    btn.textContent = "⚙️ Renderizando...";
                    gif.render();
                }
            }

            gif.on('finished', function(blob) {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = 'frost_gen_3_0.gif';
                link.href = url;
                link.click();
                
                btn.classList.remove('recording');
                btn.textContent = "🎞️ Export GIF";
            });

            captureFrame();
        }
    </script>
</body>
</html>
