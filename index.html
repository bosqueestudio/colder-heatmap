 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vostok Station | Frost Gen v4.1 (Fluid Engine)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        /* === UI/UX BASE (Se mantiene igual por ahora) === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #fluidCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none; 
            display: flex;
            justify-content: space-between;
            padding: 2rem;
        }

        .panel { pointer-events: auto; }

        .left-panel { display: flex; flex-direction: column; justify-content: center; height: 100%; }

        .card {
            background: rgba(22, 22, 24, 0.85); 
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 1.5rem;
            width: 280px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .circle-wrapper { display: flex; align-items: center; gap: 1rem; }

        .progress-ring-container {
            position: relative;
            width: 70px; height: 70px;
            border-radius: 50%;
            background: #2a2a2c;
            display: flex; justify-content: center; align-items: center;
        }

        .progress-ring {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(#ffffff 0%, #ffffff var(--fill-pct, 50%), transparent var(--fill-pct, 50%), transparent 100%);
            mask: radial-gradient(transparent 58%, black 60%);
            -webkit-mask: radial-gradient(transparent 58%, black 60%);
        }

        .temp-display-circle { font-size: 1.2rem; font-weight: 600; z-index: 2; }

        .widget-labels { display: flex; flex-direction: column; }
        .widget-title { font-size: 0.95rem; font-weight: 600; }
        .widget-subtitle { font-size: 0.75rem; color: #8E8E93; margin-top: 2px;}

        .slider-container { display: flex; flex-direction: column; gap: 0.5rem; }

        .slider-header {
            display: flex; justify-content: space-between;
            font-size: 0.75rem; color: #8E8E93; font-weight: 500;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%; height: 6px; background: #2a2a2c;
            border-radius: 3px; outline: none;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px; border-radius: 50%;
            background: #FFFFFF; cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5); transition: transform 0.1s ease;
        }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); }

        .divider { height: 1px; background: rgba(255, 255, 255, 0.1); margin: 0.5rem 0; }

        .right-panel { display: flex; flex-direction: column; justify-content: center; height: 100%; }

        .toolbar {
            display: flex; flex-direction: column; gap: 0.8rem;
            background: rgba(22, 22, 24, 0.85); backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px;
            padding: 0.8rem; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        button {
            background: #2a2a2c; color: #FFFFFF; border: none;
            width: 50px; height: 50px; border-radius: 14px;
            cursor: pointer; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-size: 0.65rem; font-weight: 500; gap: 4px; transition: all 0.2s ease;
        }

        button:hover { background: #3a3a3c; transform: scale(1.05); }
        button.recording { background: #e74c3c; animation: pulse 1s infinite; }
        .icon { font-size: 1.1rem; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <canvas id="fluidCanvas"></canvas>
    
    <div class="ui-layer">
        <div class="panel left-panel">
            <div class="card">
                <div class="header-title">Vostok</div>
                <div class="circle-wrapper">
                    <div class="progress-ring-container" id="ringContainer" style="--fill-pct: 50%;">
                        <div class="progress-ring"></div>
                        <div class="temp-display-circle" id="tempDisplay">-45°</div>
                    </div>
                    <div class="widget-labels">
                        <div class="widget-title">Core Temp</div>
                        <div class="widget-subtitle">Antarctica Station</div>
                    </div>
                </div>

                <div class="slider-container">
                    <div class="slider-header">
                        <span>-89°C</span>
                        <span>0°C</span>
                    </div>
                    <input type="range" id="tempSlider" min="-89" max="0" value="-45">
                </div>

                <div class="divider"></div>

                <div class="slider-container">
                    <div class="slider-header">
                        <span style="color: #FFFFFF; font-size: 0.85rem;">Plasma Density</span>
                        <span id="sizeValueDisplay">18px</span>
                    </div>
                    <input type="range" id="sizeSlider" min="8" max="35" value="18">
                </div>
            </div>
        </div>

        <div class="panel right-panel">
            <div class="toolbar">
                <button onclick="exportImage('16:9')"><span class="icon">📸</span> 16:9</button>
                <button onclick="exportImage('3:4')"><span class="icon">📱</span> 3:4</button>
                <div class="divider" style="margin: 0;"></div>
                <button onclick="exportGIF()" id="btnGif"><span class="icon">🎞️</span> GIF</button>
                <button onclick="exportVideo()" id="btnVideo"><span class="icon">🎥</span> REC</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('fluidCanvas');
        const ctx = canvas.getContext('2d');
        const tempSlider = document.getElementById('tempSlider');
        const tempDisplay = document.getElementById('tempDisplay');
        const ringContainer = document.getElementById('ringContainer');
        const sizeSlider = document.getElementById('sizeSlider');
        const sizeValueDisplay = document.getElementById('sizeValueDisplay');
        
        let width, height;
        let time = 0;
        let gridSpacing = 18; 

        // Paleta base 
        const hexPalette = ['#010208', '#060C31', '#132378', '#2244C4', '#BAD5EF', '#ffffff'];
        
        // Convertir HEX a RGB para la interpolación matemática
        const rgbPalette = hexPalette.map(hex => {
            let v = parseInt(hex.replace('#', ''), 16);
            return { r: (v >> 16) & 255, g: (v >> 8) & 255, b: v & 255 };
        });

        // 1. FUNCIÓN DE MEZCLA DE COLORES (El secreto del gradiente fluido)
        function getInterpolatedColor(intensity, alpha = 1) {
            let t = Math.max(0, Math.min(0.999, intensity));
            let scaledT = t * (rgbPalette.length - 1);
            let index = Math.floor(scaledT);
            let frac = scaledT - index;
            
            let c1 = rgbPalette[index];
            let c2 = rgbPalette[index + 1];
            
            let r = Math.round(c1.r + (c2.r - c1.r) * frac);
            let g = Math.round(c1.g + (c2.g - c1.g) * frac);
            let b = Math.round(c1.b + (c2.b - c1.b) * frac);
            
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // 2. CAPA DE RUIDO (Film Grain)
        const noiseCanvas = document.createElement('canvas');
        const noiseCtx = noiseCanvas.getContext('2d');
        function generateNoise() {
            noiseCanvas.width = width;
            noiseCanvas.height = height;
            const imgData = noiseCtx.createImageData(width, height);
            const buffer = new Uint32Array(imgData.data.buffer);
            for (let i = 0; i < buffer.length; i++) {
                // Genera estática en blanco y negro con opacidad baja (aprox 6-8%)
                let shade = Math.random() * 255;
                buffer[i] = (15 << 24) | (shade << 16) | (shade << 8) | shade;
            }
            noiseCtx.putImageData(imgData, 0, 0);
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            generateNoise(); // Regenerar ruido al tamaño exacto
        }
        window.addEventListener('resize', resize);
        resize();

        function updateUI() {
            let temp = parseInt(tempSlider.value);
            tempDisplay.textContent = `${temp}°`;
            let pct = ((temp + 89) / 89) * 100;
            ringContainer.style.setProperty('--fill-pct', `${pct}%`);
        }

        tempSlider.addEventListener('input', updateUI);
        
        sizeSlider.addEventListener('input', (e) => {
            gridSpacing = parseInt(e.target.value);
            sizeValueDisplay.textContent = `${gridSpacing}px`;
        });

        updateUI();

        // === MOTOR GENERATIVO: PLASMA CONTINUO ===
        function draw() {
            ctx.fillStyle = '#010208'; // Color abisal base
            ctx.fillRect(0, 0, width, height);

            let tempValue = Math.abs(parseInt(tempSlider.value)); 
            let coldFactor = tempValue / 89; 

            // Para que parezca fluido, usamos global composite operation
            ctx.globalCompositeOperation = 'lighter';

            for (let x = 0; x < width + gridSpacing; x += gridSpacing) {
                for (let y = 0; y < height + gridSpacing; y += gridSpacing) {
                    
                    let wave1 = Math.sin((x * 0.003) + time);
                    let wave2 = Math.cos((y * 0.004) - time);
                    let wave3 = Math.sin(((x + y) * 0.002) + time * 0.4);
                    
                    let rawIntensity = (wave1 + wave2 + wave3 + 3) / 6;
                    let energyBias = 0.20 - (coldFactor * 0.55); 
                    let intensity = Math.max(0.01, Math.min(0.99, rawIntensity + energyBias));

                    // SUPERPOSICIÓN: Los radios ahora son un 180% del espaciado de cuadrícula
                    let maxRadius = gridSpacing * 1.8; 
                    let radius = intensity * maxRadius;

                    // Ignorar puntos casi invisibles para optimizar
                    if (radius < 1) continue;

                    // Dibujar gradientes radiales para cada "nodo" para que se fusionen suavemente
                    let radGrad = ctx.createRadialGradient(x, y, 0, x, y, radius);
                    radGrad.addColorStop(0, getInterpolatedColor(intensity, 0.8));
                    radGrad.addColorStop(1, getInterpolatedColor(intensity - 0.1, 0));

                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = radGrad;
                    ctx.fill();
                }
            }

            // Aplicar el Noise/Grano Fotográfico por encima de todo
            ctx.globalCompositeOperation = 'overlay'; // Mezcla el ruido preservando el contraste
            ctx.drawImage(noiseCanvas, 0, 0);

            // Restaurar modo normal
            ctx.globalCompositeOperation = 'source-over';

            time += 0.012 + (coldFactor * 0.008); 
            requestAnimationFrame(draw);
        }
        draw();

        // === SISTEMA DE EXPORTACIÓN (Sin cambios) ===
        function exportImage(ratioStr) {
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            let realW = window.innerWidth, realH = window.innerHeight;
            let rW = ratioStr === '16:9' ? 16 : 3, rH = ratioStr === '16:9' ? 9 : 4;
            let cropWidth = realW, cropHeight = (realW / rW) * rH;
            if (cropHeight > realH) { cropHeight = realH; cropWidth = (realH / rH) * rW; }
            tempCanvas.width = cropWidth; tempCanvas.height = cropHeight;
            let sX = (realW - cropWidth) / 2, sY = (realH - cropHeight) / 2;
            tCtx.drawImage(canvas, 0, 0, width, height, -sX, -sY, realW, realH);
            const link = document.createElement('a');
            link.download = `vostok_gen_${ratioStr.replace(':','x')}.png`;
            link.href = tempCanvas.toDataURL('image/png', 1.0);
            link.click();
        }

        let mediaRecorder; let recordedChunks = [];
        function exportVideo() {
            const btn = document.getElementById('btnVideo');
            if (btn.classList.contains('recording')) return; 
            btn.classList.add('recording'); btn.innerHTML = `<span class="icon">🔴</span> REC`;
            recordedChunks = [];
            const stream = canvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a'); link.download = `vostok_gen.webm`; link.href = url; link.click();
                URL.revokeObjectURL(url);
                btn.classList.remove('recording'); btn.innerHTML = `<span class="icon">🎥</span> REC`;
            };
            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 5000);
        }

        function exportGIF() {
            if (typeof GIF === 'undefined') { alert("GIF.js inicializando, intenta de nuevo."); return; }
            const btn = document.getElementById('btnGif');
            if (btn.classList.contains('recording')) return;
            btn.classList.add('recording'); btn.innerHTML = `<span class="icon">⏳</span> WAIT`;
            const gifCanvas = document.createElement('canvas');
            gifCanvas.width = 480; gifCanvas.height = 320;
            const gCtx = gifCanvas.getContext('2d');
            const gif = new GIF({ workers: 2, quality: 6, width: 480, height: 320, workerScript: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js' });
            let framesCaptured = 0; const maxFrames = 40; 
            function captureFrame() {
                gCtx.drawImage(canvas, 0, 0, width, height, 0, 0, 480, 320);
                gif.addFrame(gCtx, {copy: true, delay: 35});
                framesCaptured++;
                if(framesCaptured < maxFrames) { requestAnimationFrame(captureFrame); } 
                else { btn.innerHTML = `<span class="icon">⚙️</span> PROC`; gif.render(); }
            }
            gif.on('finished', function(blob) {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a'); link.download = 'vostok_gen.gif'; link.href = url; link.click();
                btn.classList.remove('recording'); btn.innerHTML = `<span class="icon">🎞️</span> GIF`;
            });
            captureFrame();
        }
    </script>
</body>
</html>
