 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vostok Core | Custom Chromatic Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* === RESET & BASE === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #060c31; 
            color: #BAD5EF;
            font-family: 'Space Mono', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            text-transform: uppercase;
            font-size: 12px;
        }

        #fluidCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px; z-index: 5; pointer-events: none;
        }

        /* === UI LAYER === */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none; display: flex;
            padding: 2rem; align-items: center;
        }

        .command-center {
            pointer-events: auto;
            background: rgba(2, 4, 12, 0.88); 
            border: 1px solid rgba(62, 99, 255, 0.4); 
            border-left: 4px solid #3e63ff;
            padding: 1.5rem; width: 330px;
            display: flex; flex-direction: column; gap: 1.1rem;
            box-shadow: 0 0 40px rgba(6, 12, 49, 0.9);
            backdrop-filter: blur(10px);
            transition: opacity 0.6s ease; opacity: 1;
        }

        .header {
            display: flex; justify-content: space-between;
            border-bottom: 1px solid rgba(62, 99, 255, 0.3); padding-bottom: 0.5rem;
        }
        .app-title { font-weight: 700; color: #FFFFFF; letter-spacing: 1px; }
        .live-indicator { color: #50e3c2; animation: blink 2s infinite; display: flex; align-items: center; gap: 4px;}
        .dot { width: 6px; height: 6px; background-color: #50e3c2; border-radius: 50%; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .readout { display: flex; align-items: center; gap: 1.5rem; }
        .gauge {
            position: relative; width: 60px; height: 60px;
            border-radius: 50%; border: 1px solid rgba(62, 99, 255, 0.3);
            display: flex; justify-content: center; align-items: center;
        }
        .gauge-fill {
            position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px;
            border-radius: 50%;
            background: conic-gradient(#ffffff 0%, #ffffff var(--fill-pct, 50%), transparent var(--fill-pct, 50%), transparent 100%);
            mask: radial-gradient(transparent 60%, black 62%); -webkit-mask: radial-gradient(transparent 60%, black 62%);
        }
        .temp-val { font-size: 1.2rem; font-weight: 700; color: #FFF; z-index: 2; }
        
        .labels div { margin-bottom: 2px; }
        .lbl-title { color: #FFF; font-weight: 700; font-size: 13px;}
        .lbl-desc { color: rgba(186, 213, 239, 0.8); font-size: 10px; }
        .lbl-telemetry { color: #3e63ff; font-size: 9px; font-family: monospace; font-weight: bold; }

        .selector-wrapper { display: flex; flex-direction: column; gap: 4px; }
        .lbl-sub { font-size: 9px; color: #dcf1ff; letter-spacing: 0.5px; }
        
        .state-tabs {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
            background: rgba(255,255,255,0.03); padding: 3px; border: 1px solid rgba(62, 99, 255, 0.2);
        }
        .tab-btn {
            background: transparent; color: rgba(186, 213, 239, 0.5); border: none;
            padding: 0.5rem 0.1rem; font-family: 'Space Mono', monospace; font-size: 9px;
            font-weight: 700; cursor: pointer; transition: all 0.2s; text-align: center;
        }
        .tab-btn.active { background: #3e63ff; color: #ffffff; }
        .tab-btn:hover:not(.active) { color: #ffffff; background: rgba(255,255,255,0.08); }

        /* === CHROMATIC ENGINE SELECTOR (NEW) === */
        .palette-switch-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
            border: 1px solid rgba(62, 99, 255, 0.3); padding: 2px;
        }
        .pal-btn {
            background: transparent; color: rgba(186, 213, 239, 0.5); border: none;
            padding: 4px 0; font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; cursor: pointer;
        }
        .pal-btn.active { background: #ffffff; color: #060c31; }

        .custom-colors-row {
            display: flex; justify-content: space-between; gap: 6px;
            background: rgba(0,0,0,0.3); padding: 6px 8px; border: 1px dashed rgba(62, 99, 255, 0.3);
        }
        .color-slot { display: flex; flex-direction: column; align-items: center; gap: 3px; width: 30%; }
        .color-slot span { font-size: 8px; color: #dcf1ff; }
        
        input[type="color"] {
            -webkit-appearance: none; border: 1px solid #3e63ff;
            width: 100%; height: 18px; background: transparent; cursor: pointer; padding: 0;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; }

        /* SLIDERS */
        .controls { display: flex; flex-direction: column; gap: 0.8rem;}
        .slider-wrapper { display: flex; flex-direction: column; gap: 0.3rem; }
        .slider-header { display: flex; justify-content: space-between; font-size: 10px; color: #dcf1ff; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; height: 2px; background: rgba(62, 99, 255, 0.3); outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 16px; background: #ffffff; cursor: pointer; border-radius: 0; }
        input[type=range]::-webkit-slider-thumb:hover { background: #3e63ff; }

        .actions {
            display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem;
            margin-top: 0.2rem; padding-top: 1rem; border-top: 1px solid rgba(62, 99, 255, 0.3);
        }
        .btn {
            background: rgba(6, 12, 49, 0.8); color: #ffffff; border: 1px solid rgba(62, 99, 255, 0.5);
            padding: 0.7rem 0.5rem; cursor: pointer; font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; transition: all 0.2s; text-align: center;
        }
        .btn:hover { background: #3e63ff; color: #FFF; border-color: #FFF; }
        .btn.full { grid-column: 1 / -1; }
    </style>
</head>
<body>

    <canvas id="fluidCanvas"></canvas>
    <div class="scanlines"></div>
    
    <div class="ui-layer">
        <div class="command-center" id="commandCenter">
            
            <div class="header">
                <span class="app-title">BRAND SYSTEM</span>
                <span class="live-indicator"><span class="dot"></span> LIVE</span>
            </div>
            
            <div class="readout">
                <div class="gauge" id="ringContainer" style="--fill-pct: 50%;">
                    <div class="gauge-fill"></div>
                    <div class="temp-val" id="tempDisplay">-45°</div>
                </div>
                <div class="labels">
                    <div class="lbl-title">TEMPERATURE</div>
                    <div class="lbl-desc">COLOR WINDOW MAP</div>
                    <div class="lbl-telemetry" id="windTelemetry">WIND: 14.2 KTS</div>
                </div>
            </div>

            <!-- 1. MORPHOLOGY -->
            <div class="selector-wrapper">
                <span class="lbl-sub">ATMOSPHERIC STATE</span>
                <div class="state-tabs">
                    <button class="tab-btn active" onclick="setMorphology('CELLS', this)">POLAR CELLS</button>
                    <button class="tab-btn" onclick="setMorphology('ISOBARS', this)">ISOBAR DRIFT</button>
                    <button class="tab-btn" onclick="setMorphology('MATRIX', this)">GLACIAL MATRIX</button>
                </div>
            </div>

            <!-- 2. CHROMATIC PALETTE ENGINE (NEW) -->
            <div class="selector-wrapper">
                <span class="lbl-sub">CHROMATIC ENGINE</span>
                <div class="palette-switch-container">
                    <button class="pal-btn active" onclick="setPaletteMode('BRAND', this)">GREY GOOSE</button>
                    <button class="pal-btn" onclick="setPaletteMode('CUSTOM', this)">TRI-STOP CUSTOM</button>
                </div>

                <div class="custom-colors-row" id="customColorBox" style="display: none;">
                    <div class="color-slot">
                        <span>ABYSS</span>
                        <input type="color" id="cDark" value="#060c31">
                    </div>
                    <div class="color-slot">
                        <span>CORE</span>
                        <input type="color" id="cMid" value="#3e63ff">
                    </div>
                    <div class="color-slot">
                        <span>CREST</span>
                        <input type="color" id="cLight" value="#ffffff">
                    </div>
                </div>
            </div>

            <div class="controls">
                <div class="slider-wrapper">
                    <div class="slider-header"><span>CALIBRATE TEMP</span> <span id="tempValSub">-45°C</span></div>
                    <input type="range" id="tempSlider" min="-89" max="0" value="-45">
                </div>
                <div class="slider-wrapper">
                    <div class="slider-header"><span>STORM DENSITY</span> <span id="sizeValueDisplay">18 PX</span></div>
                    <input type="range" id="sizeSlider" min="8" max="35" value="18">
                </div>
                <div class="slider-wrapper">
                    <div class="slider-header"><span>WAVE SCALE</span> <span id="scaleValueDisplay">2.2X</span></div>
                    <input type="range" id="scaleSlider" min="10" max="60" value="22">
                </div>
                <div class="slider-wrapper">
                    <div class="slider-header"><span>WIND CHAOS</span> <span id="chaosValueDisplay">50%</span></div>
                    <input type="range" id="chaosSlider" min="0" max="100" value="50">
                </div>
            </div>

            <div class="actions">
                <button class="btn" onclick="exportImage('16:9')">IMAGE 16:9</button>
                <button class="btn" onclick="exportImage('4:5')">IMAGE 4:5</button>
                <button class="btn full" onclick="exportVideo()" id="btnVideo">DOWNLOAD VIDEO</button>
            </div>

        </div>
    </div>

    <script>
        const canvas = document.getElementById('fluidCanvas'); const ctx = canvas.getContext('2d');
        const tempSlider = document.getElementById('tempSlider'); const tempDisplay = document.getElementById('tempDisplay');
        const tempValSub = document.getElementById('tempValSub'); const ringContainer = document.getElementById('ringContainer');
        const sizeSlider = document.getElementById('sizeSlider'); const sizeValueDisplay = document.getElementById('sizeValueDisplay');
        const scaleSlider = document.getElementById('scaleSlider'); const scaleValueDisplay = document.getElementById('scaleValueDisplay');
        const chaosSlider = document.getElementById('chaosSlider'); const chaosValueDisplay = document.getElementById('chaosValueDisplay');
        const windTelemetry = document.getElementById('windTelemetry'); const commandCenter = document.getElementById('commandCenter');
        
        let width, height; let time = 0; let gridSpacing = 18; 
        let windOffsetX = 0; let windOffsetY = 0;
        let currentMorphology = 'CELLS'; 
        let paletteMode = 'BRAND';

        // Auto Fade
        let idleTimer;
        function resetIdleTimer() {
            commandCenter.style.opacity = '1'; clearTimeout(idleTimer);
            idleTimer = setTimeout(() => { commandCenter.style.opacity = '0'; }, 2000); 
        }
        window.addEventListener('mousemove', resetIdleTimer); window.addEventListener('mousedown', resetIdleTimer); window.addEventListener('touchstart', resetIdleTimer); resetIdleTimer(); 

        function setMorphology(type, elem) {
            currentMorphology = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); elem.classList.add('active');
        }

        function setPaletteMode(mode, elem) {
            paletteMode = mode;
            document.querySelectorAll('.pal-btn').forEach(b => b.classList.remove('active')); elem.classList.add('active');
            document.getElementById('customColorBox').style.display = mode === 'CUSTOM' ? 'flex' : 'none';
            rebuildActivePalette();
        }

        // === CHROMATIC MATRICES ===
        const brandHexPalette = ['#060c31', '#0d1952', '#162876', '#213a9c', '#2d4dc4', '#3a5eeb', '#3e63ff', '#5e81ff', '#7da0ff', '#9dbfff', '#bcddff', '#dcf1ff', '#ffffff'];
        const brandRgbPalette = brandHexPalette.map(h => ({ r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) }));
        
        let activeRgbPalette = [...brandRgbPalette];

        // Genera los 13 pasos matemáticos entre los 3 inputs del usuario
        function rebuildActivePalette() {
            if (paletteMode === 'BRAND') {
                activeRgbPalette = [...brandRgbPalette];
                document.body.style.backgroundColor = brandHexPalette[0];
                return;
            }
            
            const hexToRgb = h => ({ r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) });
            let cD = hexToRgb(document.getElementById('cDark').value);
            let cM = hexToRgb(document.getElementById('cMid').value);
            let cL = hexToRgb(document.getElementById('cLight').value);

            let newPal = [];
            // Pasos 0 a 6 (De Abyss a Core)
            for(let i=0; i<=6; i++){
                let f = i/6;
                newPal.push({ r: Math.round(cD.r + (cM.r - cD.r)*f), g: Math.round(cD.g + (cM.g - cD.g)*f), b: Math.round(cD.b + (cM.b - cD.b)*f) });
            }
            // Pasos 7 a 12 (De Core a Crest)
            for(let i=1; i<=6; i++){
                let f = i/6;
                newPal.push({ r: Math.round(cM.r + (cL.r - cM.r)*f), g: Math.round(cM.g + (cL.g - cM.g)*f), b: Math.round(cM.b + (cL.b - cM.b)*f) });
            }
            activeRgbPalette = newPal;
            document.body.style.backgroundColor = document.getElementById('cDark').value;
        }

        document.getElementById('cDark').addEventListener('input', rebuildActivePalette);
        document.getElementById('cMid').addEventListener('input', rebuildActivePalette);
        document.getElementById('cLight').addEventListener('input', rebuildActivePalette);

        function getMappedColor(scaledT, alpha = 1) {
            let index = Math.floor(scaledT);
            index = Math.max(0, Math.min(activeRgbPalette.length - 2, index)); 
            let frac = scaledT - index;
            let c1 = activeRgbPalette[index], c2 = activeRgbPalette[index + 1];
            
            let r = Math.round(c1.r + (c2.r - c1.r) * frac);
            let g = Math.round(c1.g + (c2.g - c1.g) * frac);
            let b = Math.round(c1.b + (c2.b - c1.b) * frac);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        const noiseCanvas = document.createElement('canvas'); const noiseCtx = noiseCanvas.getContext('2d');
        function generateNoise() {
            noiseCanvas.width = width; noiseCanvas.height = height; const imgData = noiseCtx.createImageData(width, height);
            const buffer = new Uint32Array(imgData.data.buffer);
            for (let i = 0; i < buffer.length; i++) { let shade = Math.random() * 255; buffer[i] = (15 << 24) | (shade << 16) | (shade << 8) | shade; }
            noiseCtx.putImageData(imgData, 0, 0);
        }

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; generateNoise(); }
        window.addEventListener('resize', resize); resize();

        function updateUI() {
            let temp = parseInt(tempSlider.value); tempDisplay.textContent = `${temp}°`; tempValSub.textContent = `${temp}°C`;
            let pct = ((temp + 89) / 89) * 100; ringContainer.style.setProperty('--fill-pct', `${pct}%`);
        }
        tempSlider.addEventListener('input', updateUI); sizeSlider.addEventListener('input', e => { gridSpacing = parseInt(e.target.value); sizeValueDisplay.textContent = `${gridSpacing} PX`; });
        scaleSlider.addEventListener('input', e => { scaleValueDisplay.textContent = `${(parseInt(e.target.value)/10).toFixed(1)}X`; }); chaosSlider.addEventListener('input', e => { chaosValueDisplay.textContent = `${e.target.value}%`; }); updateUI();

        // === GENERATIVE RENDER ===
        function draw() {
            ctx.fillStyle = paletteMode === 'BRAND' ? '#060c31' : document.getElementById('cDark').value;
            ctx.fillRect(0, 0, width, height);

            let tempValue = Math.abs(parseInt(tempSlider.value)); let coldFactor = tempValue / 89; 
            let windowSpan = 6; let windowStart = (1 - coldFactor) * 6;
            let waveScale = parseInt(scaleSlider.value) / 10; let chaosFactor = parseInt(chaosSlider.value) / 100;

            let windDriftX = (Math.sin(time * 0.9) * 0.4 + Math.cos(time * 1.7) * 0.3) * chaosFactor;
            let windDriftY = (Math.cos(time * 1.1) * 0.4 + Math.sin(time * 1.3) * 0.3) * chaosFactor;
            windOffsetX += 0.005 + windDriftX * 0.02; windOffsetY += 0.003 + windDriftY * 0.02;

            if (Math.random() < 0.05) { windTelemetry.textContent = `WIND: ${(10 + (chaosFactor * 45) + Math.sin(time) * 4).toFixed(1)} KTS [VAR]`; }

            ctx.globalCompositeOperation = 'source-over';

            for (let x = -gridSpacing; x < width + gridSpacing; x += gridSpacing) {
                for (let y = -gridSpacing; y < height + gridSpacing; y += gridSpacing) {
                    
                    let nX = x * 0.0015 + windOffsetX; let nY = y * 0.0015 + windOffsetY;
                    let flow = Math.sin(nX * 1.2 + time * 0.3) + Math.cos(nY * 1.4 - time * 0.2) + Math.sin((nX + nY) * 0.8 + time * 0.4); 
                    let rawIntensity = (Math.sin(flow * waveScale * 1.8) + 1) / 2;
                    
                    if (rawIntensity < 0.02) continue; 
                    let scaledT = windowStart + (rawIntensity * windowSpan);
                    ctx.fillStyle = getMappedColor(scaledT, 0.95);

                    if (currentMorphology === 'CELLS') {
                        ctx.beginPath(); ctx.arc(x, y, rawIntensity * (gridSpacing * 1.45), 0, Math.PI * 2); ctx.fill();
                    } else if (currentMorphology === 'ISOBARS') {
                        ctx.save(); ctx.translate(x, y); ctx.rotate(flow * 1.2); 
                        ctx.fillRect(-(gridSpacing * 1.8)/2, -(rawIntensity * (gridSpacing * 0.6))/2, gridSpacing * 1.8, rawIntensity * (gridSpacing * 0.6)); ctx.restore();
                    } else if (currentMorphology === 'MATRIX') {
                        let bs = rawIntensity * (gridSpacing * 1.4); ctx.fillRect(x - bs/2, y - bs/2, bs, bs);
                    }
                }
            }

            ctx.globalCompositeOperation = 'overlay'; ctx.drawImage(noiseCanvas, 0, 0); ctx.globalCompositeOperation = 'source-over';
            time += 0.008 + (coldFactor * 0.004); requestAnimationFrame(draw);
        }
        draw();

        function exportImage(ratioStr) {
            const tempCanvas = document.createElement('canvas'); const tCtx = tempCanvas.getContext('2d');
            let realW = window.innerWidth, realH = window.innerHeight; let rW = ratioStr === '16:9' ? 16 : 4, rH = ratioStr === '16:9' ? 9 : 5;
            let cropWidth = realW, cropHeight = (realW / rW) * rH; if (cropHeight > realH) { cropHeight = realH; cropWidth = (realH / rH) * rW; }
            tempCanvas.width = cropWidth; tempCanvas.height = cropHeight; let sX = (realW - cropWidth) / 2, sY = (realH - cropHeight) / 2;
            tCtx.drawImage(canvas, 0, 0, width, height, -sX, -sY, realW, realH); const link = document.createElement('a'); link.download = `vostok_render_${ratioStr.replace(':','x')}.png`; link.href = tempCanvas.toDataURL('image/png', 1.0); link.click();
        }

        let mediaRecorder; let recordedChunks = [];
        function exportVideo() {
            const btn = document.getElementById('btnVideo'); if (btn.classList.contains('recording')) return; 
            btn.classList.add('recording'); btn.textContent = `RECORDING... PLEASE WAIT`; recordedChunks = [];
            const stream = canvas.captureStream(30); mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' }); const url = URL.createObjectURL(blob); const link = document.createElement('a'); link.download = `vostok_render.webm`; link.href = url; link.click(); URL.revokeObjectURL(url); btn.classList.remove('recording'); btn.textContent = `DOWNLOAD VIDEO`;
            }; mediaRecorder.start(); setTimeout(() => mediaRecorder.stop(), 5000);
        }
    </script>
</body>
</html>
