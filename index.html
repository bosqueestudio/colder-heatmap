<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Gen v2.2 - Ultra Liquid Gradient</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        /* === UI/UX RESET & BASE === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #020412;
            color: #FFFFFF;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* === CONTENEDOR PRINCIPAL === */
        .visual-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #020412;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* === INTERFAZ DE USUARIO (GLASSMORPHISM TOP) === */
        .header-title {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            background: rgba(2, 4, 18, 0.25);
            backdrop-filter: blur(12px);
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            border: 1px solid rgba(186, 213, 239, 0.1);
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            z-index: 10;
        }

        /* === PANEL DE CONTROL DE DISEÑO (BOTTOM) === */
        .ui-panel {
            position: absolute;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(6, 12, 49, 0.25);
            backdrop-filter: blur(20px);
            padding: 1.8rem;
            border-radius: 16px;
            border: 1px solid rgba(186, 213, 239, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2.5rem;
            z-index: 10;
            width: 90%;
            max-width: 900px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
        }

        /* Bloque Izquierdo: Temperatura */
        .panel-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-grow: 1;
        }

        .temp-display {
            font-size: 3rem;
            font-weight: 300;
            min-width: 140px;
            letter-spacing: -1px;
            text-shadow: 0 4px 12px rgba(186, 213, 239, 0.2);
        }

        .slider-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .slider-wrapper span {
            font-size: 0.8rem;
            color: #BAD5EF;
            opacity: 0.6;
            font-weight: 600;
        }

        input[type=range] {
            flex-grow: 1;
            -webkit-appearance: none;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 24px;
            border-radius: 3px;
            background: #FFFFFF;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255,255,255,0.8);
            transition: transform 0.1s ease;
        }

        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }

        /* Bloque Derecho: Controles Grid */
        .panel-right {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.6rem;
            min-width: 260px;
        }

        button {
            background: rgba(255, 255, 255, 0.03);
            color: rgba(218, 235, 255, 0.8);
            border: 1px solid rgba(186, 213, 239, 0.2);
            padding: 0.6rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.25s ease;
            text-align: center;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #FFFFFF;
            border-color: rgba(255, 255, 255, 0.6);
        }

        button.recording {
            background: #e74c3c;
            color: white;
            border-color: #e74c3c;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="visual-container">
        <div class="header-title">Vostok Station, Antarctica | Frost Gen v2.2</div>
        
        <canvas id="fluidCanvas"></canvas>
        
        <div class="ui-panel">
            <div class="panel-left">
                <div class="temp-display" id="tempDisplay">-45°C</div>
                <div class="slider-wrapper">
                    <span>-89</span>
                    <input type="range" id="tempSlider" min="-89" max="0" value="-45">
                    <span>0</span>
                </div>
            </div>
            
            <div class="panel-right">
                <button onclick="exportImage('16:9')">📸 Img 16:9</button>
                <button onclick="exportImage('3:4')">📸 Img 3:4</button>
                <button onclick="exportGIF()" id="btnGif">🎞️ Export GIF</button>
                <button onclick="exportVideo()" id="btnVideo">🎥 Export WebM</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('fluidCanvas');
        const ctx = canvas.getContext('2d');
        const tempSlider = document.getElementById('tempSlider');
        const tempDisplay = document.getElementById('tempDisplay');
        
        let width, height;
        let time = 0;

        // === PALETA CROMÁTICA EXPANDIDA (8 Escalas de Oscuro a Claro) ===
        const palette = [
            '#020412', // Base Abisal Extrema
            '#060C31', // Tu color 1
            '#0d174d', // Transición Oscura
            '#16267E', // Tu color 2
            '#4361ab', // Azul Glaciar Medio
            '#7ba4cf', // Azul Escarcha Transición
            '#BAD5EF', // Tu color 3
            '#FFFFFF'  // Tu color 4 (Luz Máxima)
        ];

        // Canvas de ruido estático precargado para rendimiento
        const noiseCanvas = document.createElement('canvas');
        const noiseCtx = noiseCanvas.getContext('2d');
        
        function initNoise() {
            noiseCanvas.width = 250;
            noiseCanvas.height = 250;
            const imgData = noiseCtx.createImageData(250, 250);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                let val = Math.random() * 255;
                data[i] = val;
                data[i+1] = val;
                data[i+2] = val;
                data[i+3] = 255; // Opacidad total interna
            }
            noiseCtx.putImageData(imgData, 0, 0);
        }
        initNoise();

        function resize() {
            // Bajamos resolución interna a /2 para permitir un desenfoque (blur) masivo de 100px super fluido
            width = window.innerWidth / 2;
            height = window.innerHeight / 2;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        tempSlider.addEventListener('input', (e) => {
            tempDisplay.textContent = `${e.target.value}°C`;
        });

        // === MOTOR GENERATIVO LÍQUIDO CON ONDAS MARCADAS ===
        function draw() {
            ctx.fillStyle = palette[0];
            ctx.fillRect(0, 0, width, height);

            let tempValue = Math.abs(parseInt(tempSlider.value)); 
            let coldFactor = tempValue / 89; // 0 (Cálido/Blanco) a 1 (Frío Extremo/Azul)

            // Filtro de desenfoque masivo para fundir los colores como fotografía analógica
            ctx.filter = 'blur(95px)';

            // Dibujamos capas horizontales onduladas apiladas verticalmente
            const layers = 6;
            for (let i = 0; i < layers; i++) {
                ctx.beginPath();
                
                // Posición base vertical de la capa
                let baseY = (height / (layers - 1)) * i;
                
                ctx.moveTo(-50, height + 100); // Empezar abajo a la izquierda fuera de rango
                ctx.lineTo(-50, baseY);

                // Recorremos horizontalmente creando ondas MUY marcadas (Amplitud extendida)
                for (let x = -50; x <= width + 50; x += 30) {
                    // Frecuencias y velocidades combinadas para distorsión agresiva
                    let wave1 = Math.sin((x * 0.006) + time + (i * 0.7)) * 110; 
                    let wave2 = Math.cos((x * 0.012) - (time * 1.5)) * 50 * (1 - coldFactor * 0.4);
                    
                    // Modificador reactivo al slider: el frío aplana o agita ciertas masas térmicas
                    let y = baseY + wave1 + wave2 + (coldFactor * 60 * Math.sin(time + i));
                    ctx.lineTo(x, y);
                }

                ctx.lineTo(width + 50, height + 100);
                ctx.closePath();

                // Selección dinámica de color en base al slider y al orden de capas
                let colorIndex = Math.min(palette.length - 1, Math.floor((i / layers) * 4 + (coldFactor * 3.5)));
                ctx.fillStyle = palette[palette.length - 1 - colorIndex];
                
                // Variación de opacidad orgánica
                ctx.globalAlpha = 0.7 + (Math.sin(time + i) * 0.1);
                ctx.fill();
            }

            // Quitar filtro para aplicar el grano nítido encima
            ctx.filter = 'none';
            ctx.globalAlpha = 1.0;

            // === APLICACIÓN DE RUIDO REACTIVO AL MOVIMIENTO ===
            // Incrementamos la opacidad del grano si hace más frío o si hay más turbulencia simulada
            let noiseOpacity = 0.04 + (coldFactor * 0.04) + (Math.sin(time * 2) * 0.01);
            ctx.globalAlpha = noiseOpacity;
            ctx.globalCompositeOperation = 'overlay';

            // Hacemos que el ruido "baile" cambiando el offset aleatoriamente en cada frame
            let noiseX = Math.floor(Math.random() * 100);
            let noiseY = Math.floor(Math.random() * 100);

            // Rellenamos la pantalla con el patrón de ruido
            for (let x = 0; x < width; x += 250) {
                for (let y = 0; y < height; y += 250) {
                    ctx.drawImage(noiseCanvas, x - noiseX, y - noiseY);
                }
            }

            // Resetear modos normales del canvas
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1.0;

            // Velocidad de animación reactiva (más frío = partículas y ondas se aceleran)
            time += 0.012 + (coldFactor * 0.015); 
            requestAnimationFrame(draw);
        }
        draw();

        // === SISTEMA DE EXPORTACIÓN REPOSITORIO GITHUB ===

        // Inyecta el ruido nítido directamente en los renders de descarga
        function applyNoiseToExport(exportCtx, w, h, factor) {
            exportCtx.save();
            exportCtx.globalAlpha = 0.05 + (factor * 0.04);
            exportCtx.globalCompositeOperation = 'overlay';
            for (let x = 0; x < w; x += 250) {
                for (let y = 0; y < h; y += 250) {
                    exportCtx.drawImage(noiseCanvas, x, y);
                }
            }
            exportCtx.restore();
        }

        function exportImage(ratioStr) {
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            
            let realW = window.innerWidth;
            let realH = window.innerHeight;
            let rW = ratioStr === '16:9' ? 16 : 3;
            let rH = ratioStr === '16:9' ? 9 : 4;

            let cropWidth = realW;
            let cropHeight = (realW / rW) * rH;

            if (cropHeight > realH) {
                cropHeight = realH;
                cropWidth = (realH / rH) * rW;
            }

            tempCanvas.width = cropWidth;
            tempCanvas.height = cropHeight;

            let sX = (realW - cropWidth) / 2;
            let sY = (realH - cropHeight) / 2;
            
            // Renderizar frame actual a tamaño completo
            tCtx.drawImage(canvas, 0, 0, width, height, -sX, -sY, realW, realH);
            
            let factor = Math.abs(parseInt(tempSlider.value)) / 89;
            applyNoiseToExport(tCtx, cropWidth, cropHeight, factor);

            const link = document.createElement('a');
            link.download = `frost_liquid_${ratioStr.replace(':','x')}.png`;
            link.href = tempCanvas.toDataURL('image/png', 1.0);
            link.click();
        }

        let mediaRecorder;
        let recordedChunks = [];
        
        function exportVideo() {
            const btn = document.getElementById('btnVideo');
            if (btn.classList.contains('recording')) return; 
            
            btn.classList.add('recording');
            btn.textContent = "🔴 Grabando (5s)...";
            recordedChunks = [];

            const stream = canvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = `frost_liquid_loop.webm`;
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
                
                btn.classList.remove('recording');
                btn.textContent = "🎥 Export WebM";
            };

            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 5000);
        }

        function exportGIF() {
            if (typeof GIF === 'undefined') {
                alert("GIF.js se está inicializando en segundo plano. Intenta de nuevo.");
                return;
            }
            
            const btn = document.getElementById('btnGif');
            if (btn.classList.contains('recording')) return;
            
            btn.classList.add('recording');
            btn.textContent = "⏳ Procesando...";

            const gifCanvas = document.createElement('canvas');
            gifCanvas.width = 450; 
            gifCanvas.height = 320;
            const gCtx = gifCanvas.getContext('2d');

            const gif = new GIF({
                workers: 2,
                quality: 8,
                width: 450,
                height: 320,
                workerScript: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'
            });

            let framesCaptured = 0;
            const maxFrames = 40; 
            let factor = Math.abs(parseInt(tempSlider.value)) / 89;

            function captureFrame() {
                gCtx.drawImage(canvas, 0, 0, 450, 320);
                applyNoiseToExport(gCtx, 450, 320, factor);
                gif.addFrame(gCtx, {copy: true, delay: 35});
                
                framesCaptured++;
                if(framesCaptured < maxFrames) {
                    requestAnimationFrame(captureFrame);
                } else {
                    btn.textContent = "⚙️ Renderizando...";
                    gif.render();
                }
            }

            gif.on('finished', function(blob) {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = 'frost_liquid.gif';
                link.href = url;
                link.click();
                
                btn.classList.remove('recording');
                btn.textContent = "🎞️ Export GIF";
            });

            captureFrame();
        }
    </script>
</body>
</html>
