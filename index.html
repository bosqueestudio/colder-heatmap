 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vostok Studio | Global Gravity Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* === RESET & BASE === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #060c31; color: #BAD5EF;
            font-family: 'Space Mono', monospace;
            overflow: hidden; height: 100vh; width: 100vw;
            text-transform: uppercase; font-size: 12px; cursor: crosshair;
        }

        #fluidCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px; z-index: 5; pointer-events: none;
        }

        /* === UI LAYER === */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none; display: flex;
            padding: 1.5rem; align-items: center;
        }

        .command-center {
            pointer-events: auto; background: rgba(2, 4, 12, 0.92); 
            border: 1px solid rgba(62, 99, 255, 0.4); border-left: 4px solid #3e63ff;
            padding: 1.2rem; width: 340px; display: flex; flex-direction: column; gap: 0.85rem;
            box-shadow: 0 0 40px rgba(6, 12, 49, 0.9); backdrop-filter: blur(12px);
            transition: opacity 0.6s ease; opacity: 1; max-height: 95vh; overflow-y: auto;
            cursor: default;
        }

        .command-center::-webkit-scrollbar { width: 4px; }
        .command-center::-webkit-scrollbar-thumb { background: #3e63ff; }

        .header { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(62, 99, 255, 0.3); padding-bottom: 0.4rem; }
        .app-title { font-weight: 700; color: #FFFFFF; letter-spacing: 1px; }
        .live-indicator { color: #50e3c2; animation: blink 2s infinite; display: flex; align-items: center; gap: 4px;}
        .dot { width: 6px; height: 6px; background-color: #50e3c2; border-radius: 50%; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .readout { display: flex; align-items: center; gap: 1.2rem; }
        .gauge {
            position: relative; width: 50px; height: 50px; border-radius: 50%; border: 1px solid rgba(62, 99, 255, 0.3);
            display: flex; justify-content: center; align-items: center;
        }
        .gauge-fill {
            position: absolute; top: 3px; left: 3px; right: 3px; bottom: 3px; border-radius: 50%;
            background: conic-gradient(#ffffff 0%, #ffffff var(--fill-pct, 50%), transparent var(--fill-pct, 50%), transparent 100%);
            mask: radial-gradient(transparent 60%, black 62%); -webkit-mask: radial-gradient(transparent 60%, black 62%);
        }
        .temp-val { font-size: 1.1rem; font-weight: 700; color: #FFF; z-index: 2; }
        
        .labels div { margin-bottom: 1px; }
        .lbl-title { color: #FFF; font-weight: 700; font-size: 11px;}
        .lbl-desc { color: rgba(186, 213, 239, 0.8); font-size: 8.5px; }

        .selector-wrapper { display: flex; flex-direction: column; gap: 3px; }
        .lbl-sub { font-size: 8.5px; color: #dcf1ff; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center;}
        
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; background: rgba(255,255,255,0.02); padding: 2px; border: 1px solid rgba(62, 99, 255, 0.2); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; border: 1px solid rgba(62, 99, 255, 0.3); padding: 2px; }
        
        .tab-btn {
            background: transparent; color: rgba(186, 213, 239, 0.5); border: none; padding: 0.4rem 0.1rem; font-family: 'Space Mono', monospace; font-size: 8px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-align: center;
        }
        .tab-btn.active { background: #3e63ff; color: #ffffff; }
        .tab-btn:hover:not(.active) { color: #ffffff; background: rgba(255,255,255,0.08); }

        /* === 6-CHANNEL HEX ENGINE === */
        .hex-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
            background: rgba(0,0,0,0.3); padding: 5px; border: 1px dashed rgba(62, 99, 255, 0.3);
        }
        .hex-slot { display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.05); border: 1px solid rgba(62, 99, 255, 0.2); padding: 2px; }
        .hex-slot input[type="color"] {
            -webkit-appearance: none; border: none; width: 14px; height: 14px; background: transparent; cursor: pointer; padding: 0;
        }
        .hex-slot input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        .hex-slot input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }
        .hex-slot input[type="text"] {
            background: transparent; border: none; color: #fff; font-family: 'Space Mono', monospace; font-size: 8.5px; width: 100%; outline: none; text-transform: uppercase;
        }

        /* === PRESET MEMORY BANK === */
        .preset-container { border: 1px solid #50e3c244; background: rgba(80, 227, 194, 0.03); padding: 5px; display: flex; flex-direction: column; gap: 4px;}
        .preset-header { font-size: 8px; color: #50e3c2; font-weight: bold; display: flex; justify-content: space-between; align-items: center;}
        .mode-toggle { background: #060c31; color: #50e3c2; border: 1px solid #50e3c2; padding: 2px 5px; font-size: 7.5px; cursor: pointer; font-weight: bold;}
        .mode-toggle.save-mode { background: #e74c3c; color: #fff; border-color: #e74c3c; animation: blink 1s infinite;}
